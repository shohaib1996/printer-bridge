<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    @page { size: 4in 6in; margin: 0; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 4in;
      height: 6in;
      font-family: sans-serif;
      background: #fff;
      color: #000;
      overflow: hidden;
    }
    .label {
      width: 4in;
      height: 6in;
      padding: 0.2in;
      display: flex;
      flex-direction: column;
      gap: 0.08in;
      overflow: hidden;
    }
    .stage-badge {
      font-size: 8pt;
      font-weight: 700;
      background: #000;
      color: #fff;
      padding: 2px 8px;
      border-radius: 2px;
      display: inline-block;
      align-self: flex-start;
      letter-spacing: 0.03em;
    }
    .store-name {
      font-size: 20pt;
      font-weight: 900;
      line-height: 1.1;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      word-break: break-word;
    }
    hr {
      border: none;
      border-top: 2px solid #000;
      margin: 0.06in 0;
    }
    .flavor-row {
      font-size: 16pt;
      font-weight: 800;
      line-height: 1.2;
    }
    .meta-row {
      font-size: 11pt;
      font-weight: 700;
      line-height: 1.3;
    }
    .shelf-block {
      font-size: 13pt;
      font-weight: 700;
      line-height: 1.5;
      font-family: monospace;
      background: #f5f5f5;
      border: 1px solid #ccc;
      padding: 0.08in 0.12in;
      border-radius: 3px;
    }
    .detail-block {
      font-size: 9pt;
      font-weight: 500;
      line-height: 1.6;
      font-family: monospace;
    }
    .barcode-row {
      display: flex;
      justify-content: center;
      margin-top: auto;
      padding-top: 0.1in;
    }
    svg.barcode {
      display: block;
    }
  </style>
</head>
<body>
  <div class="label">
    <div class="stage-badge">STAGE 2 — DEHYDRATOR</div>
    <div class="store-name">{{storeName}}</div>
    <hr />
    <div class="flavor-row">{{flavor}}</div>
    <div class="meta-row">QTY: ~{{quantity}} &nbsp;|&nbsp; {{productType}}</div>
    <hr />
    <div class="shelf-block">
      <div>UNIT: {{dehydratorUnitId}} &nbsp; SHELF: {{shelfPosition}}</div>
      <div>MOLD: {{moldId}}</div>
    </div>
    <div class="detail-block">
      <div>TRAY: {{trayId}}</div>
      <div>COOK ITEM: {{cookItemId}}</div>
      <div>ORDER: {{orderId}}</div>
      <div>LOADED: {{loadedDate}} {{loadedTime}}</div>
    </div>
    <div class="barcode-row">
      <svg class="barcode" id="barcode"></svg>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <script>
    JsBarcode("#barcode", "{{trayId}}", {
      format: "CODE128",
      width: 2,
      height: 70,
      displayValue: true,
      fontSize: 10,
      margin: 4,
      background: "#ffffff",
      lineColor: "#000000",
    });
  </script>
</body>
</html>
